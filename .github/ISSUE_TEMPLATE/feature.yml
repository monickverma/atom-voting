name: Feature Request
description: Suggest a new feature or enhancement
title: "feat: "
labels: ["type: feature"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for sharing your idea! Please fill out the form below.
        See [docs/issues/feature-example.md](../docs/issues/feature-example.md) for a complete example.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? Who benefits?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature. Include API shapes, UI sketches, or pseudocode if helpful.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches did you consider? Why are they not the right fit?
    validations:
      required: false

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: How will we know this feature is complete? List concrete, testable criteria.
      placeholder: |
        - [ ] Endpoint accepts ...
        - [ ] Returns error code ... when ...
        - [ ] Unit tests added
        - [ ] Docs updated
    validations:
      required: false
