name: Bug Report
description: Report a bug or unexpected behaviour
title: "fix: "
labels: ["type: bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug. Please fill out the form below as completely as possible.
        See [docs/issues/bug-example.md](../docs/issues/bug-example.md) for a complete example.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Exact steps to reproduce the behaviour.
      placeholder: |
        1. Send a POST request to ...
        2. With body ...
        3. Observe HTTP 500
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behaviour
      description: What actually happened? Include error messages and stack traces.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Python version, OS, FastAPI version etc.
      placeholder: |
        - Python: 3.12.x
        - OS: Ubuntu 22.04
        - FastAPI: 0.110.0
    validations:
      required: false
